[words]
accepted = [
  "ASO",
  "dialog",
  "dialogs",
  "handwritten",
  "organizational",
  "oxendict",
  "yse",
]

[words.corrections]
organisational = "organizational"

[phrases.corrections]
"hand-written" = "handwritten"

[patterns]
ignore = [
  '`[^`\n]+`',
  '(?s)```.*?```',
  '\brust-analyzer\b',
]

[files]
exclude = [
  ".git",
  ".hypothesis",
  ".pytest_cache",
  ".tox",
  ".terraform",
  ".typos-oxendict-base.json",
  ".typos-oxendict-base.toml",
  ".uv-cache",
  ".uv-tools",
  ".venv",
  "Cargo.lock",
  "bun.lock",
  "data/typos-oxendict-base.toml",
